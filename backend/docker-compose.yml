services:
  web:
    build: .
    command: gunicorn retyn.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  worker:
    build: .
    command: celery -A retyn worker -l info
    depends_on:
      - db
      - redis
    env_file:
      - .env
    

  db:   
    image: postgres:15
    environment:
      POSTGRES_DB: retyn_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

  redis:
    image: redis:7

