name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Debug Secret Length
        run: |
          echo "Username length: ${#USER}"
          echo "Token length: ${#TOKEN}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/retyn-backend:latest .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/retyn-backend:latest


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Retyn/backend

            echo "Pulling latest images..."
            docker-compose pull

            echo "Restarting services..."
            docker-compose down
            docker-compose up -d

            echo "Cleaning unused images..."
            docker image prune -f
