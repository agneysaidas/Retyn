name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/retyn-backend:latest .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/retyn-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/retyn-backend:latest
            docker stop backend_web_1 || true
            docker rm backend_web_1 || true

            docker run -d \
              --name backend_web_1 \
              -p 8000:8000 \
              --env-file ~/Retyn/backend/.env \
              ${{ secrets.DOCKER_USERNAME }}/retyn-backend:latest
